<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f7;
            padding-bottom: 40px;
        }
        
        .header {
            background: linear-gradient(135deg, #6B4423 0%, #3E2723 100%);
            color: white;
            padding: 40px 20px 30px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .category {
            background: white;
            margin: 20px 15px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        
        .category-title {
            background: #6B4423;
            color: white;
            padding: 18px 20px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .menu-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s ease;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:active {
            background: #fafafa;
        }
        
        .item-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .item-name {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            flex: 1;
        }
        
        .item-price {
            font-size: 18px;
            font-weight: 700;
            color: #6B4423;
            margin-left: 15px;
        }
        
        .item-description {
            font-size: 14px;
            color: #86868b;
            line-height: 1.5;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #86868b;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        
        .footer {
            text-align: center;
            padding: 30px 20px 20px;
            color: #86868b;
            font-size: 13px;
        }
        
        .admin-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6B4423;
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(107, 68, 35, 0.4);
            transition: transform 0.3s ease;
        }
        
        .admin-btn:active {
            transform: scale(0.95);
        }
        
        /* Loading animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .category {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>☕ Coffee Paradise</h1>
        <p>Fresh & Delicious Every Day</p>
    </div>
    
    <div class="container" id="menu-container">
        <!-- Menu loads here -->
    </div>
    
    <div class="footer">
        Made with ❤️ | Tap ⚙️ to edit menu
    </div>
    
    <a href="admin.html" class="admin-btn">⚙️</a>

    <script>
        // Default menu
        const defaultMenu = {
            "☕ Coffee": [
                { name: "Espresso", description: "Strong and bold Italian classic", price: "$3.00" },
                { name: "Cappuccino", description: "Espresso with steamed milk foam", price: "$4.50" },
                { name: "Latte", description: "Smooth espresso with milk", price: "$4.50" },
                { name: "Americano", description: "Espresso with hot water", price: "$3.50" },
                { name: "Mocha", description: "Chocolate and espresso blend", price: "$5.00" }
            ],
            "🥤 Smoothies": [
                { name: "Strawberry Blast", description: "Fresh strawberries & yogurt", price: "$5.50" },
                { name: "Mango Paradise", description: "Tropical mango smoothie", price: "$5.50" },
                { name: "Berry Mix", description: "Mixed berries delight", price: "$6.00" },
                { name: "Green Power", description: "Spinach, kiwi & apple", price: "$6.50" }
            ],
            "🍰 Food": [
                { name: "Croissant", description: "Buttery and flaky pastry", price: "$3.50" },
                { name: "Chicken Sandwich", description: "Grilled chicken with veggies", price: "$7.00" },
                { name: "Chocolate Cake", description: "Rich chocolate heaven", price: "$4.50" },
                { name: "Blueberry Muffin", description: "Fresh baked daily", price: "$3.00" }
            ]
        };

        function loadMenu() {
            const saved = localStorage.getItem('coffeeMenu');
            return saved ? JSON.parse(saved) : defaultMenu;
        }

        function displayMenu() {
            const menu = loadMenu();
            const container = document.getElementById('menu-container');
            
            if (Object.keys(menu).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No menu items yet<br>Tap ⚙️ to add items</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            
            for (let category in menu) {
                if (menu[category].length === 0) continue;
                
                let html = `
                    <div class="category">
                        <div class="category-title">${category}</div>
                `;
                
                menu[category].forEach(item => {
                    html += `
                        <div class="menu-item">
                            <div class="item-top">
                                <div class="item-name">${item.name}</div>
                                <div class="item-price">${item.price}</div>
                            </div>
                            <div class="item-description">${item.description}</div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                container.innerHTML += html;
            }
        }

        displayMenu();
        
        // Auto refresh when menu changes
        window.addEventListener('storage', (e) => {
            if (e.key === 'coffeeMenu') displayMenu();
        });
    </script>
</body>
</html>
