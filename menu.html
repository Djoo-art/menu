<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Premium Coffee Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --espresso: #2C1B18; --cream: #F9F5F2; }
        body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--espresso); margin:0; }
        .hero { background: var(--espresso); padding: 80px 20px; text-align: center; color: white; border-bottom: 5px solid var(--gold); }
        .hero h1 { font-size: 32px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .hero p { color: var(--gold); font-weight: 600; margin-top: 10px; }
        .container { max-width: 650px; margin: -30px auto 0; padding: 20px; position: relative; }
        .category-title { font-size: 22px; font-weight: 900; color: var(--espresso); margin: 40px 0 20px; text-transform: uppercase; border-left: 5px solid var(--gold); padding-left: 15px; }
        .item-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); display: flex; transition: 0.3s; }
        .item-card:hover { transform: translateY(-3px); }
        .item-img { width: 120px; height: 120px; object-fit: cover; background: #eee; flex-shrink: 0; }
        .item-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .item-name { font-weight: 800; font-size: 18px; }
        .item-price { color: var(--gold); font-weight: 900; font-size: 16px; white-space: nowrap; margin-left: 10px; }
        .item-desc { font-size: 13px; color: #666; line-height: 1.4; }
        #loader { text-align: center; padding: 100px; font-weight: 700; color: var(--gold); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Premium Coffee</h1>
        <p>Tunis — Carthage</p>
    </div>

    <div class="container" id="menu-view">
        <div id="loader">L'ART DU CAFÉ...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- PASTE THE SAME FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDrS3qQrsUX9uZ2feirxypuuZAOr8PNGtI",
            authDomain: "cofee-shop-26e73.firebaseapp.com",
            projectId: "cofee-shop-26e73",
            storageBucket: "cofee-shop-26e73.firebasestorage.app",
             messagingSenderId: "1078896374249",
             appId: "1:1078896374249:web:e633362be7cca4a9479b78",
            measurementId: "G-KLGNXCJXBG"

        };
        // -------------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(doc(db, "settings", "menu"), (docSnap) => {
            const container = document.getElementById('menu-view');
            if (!docSnap.exists()) { container.innerHTML = "No menu found."; return; }
            
            const data = docSnap.data().categories;
            container.innerHTML = '';

            for (let cat in data) {
                let html = `<div class="category-title">${cat}</div>`;
                data[cat].forEach(item => {
                    // Tunisian Price Formatting (e.g. 5.500 DT)
                    const p = parseFloat(item.price || 0).toFixed(3).replace('.', ',') + " DT";
                    html += `
                        <div class="item-card">
                            <img src="${item.image || 'https://via.placeholder.com/150'}" class="item-img">
                            <div class="item-info">
                                <div class="item-header">
                                    <div class="item-name">${item.name}</div>
                                    <div class="item-price">${p}</div>
                                </div>
                                <div class="item-desc">${item.description}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML += html;
            }
        });
    </script>
</body>
</html>
